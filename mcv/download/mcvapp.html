<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MCV App | Descargar</title>

  <style>
    :root{
      --overlay: rgba(0,0,0,.55);
      --btn-bg: rgba(255,255,255,.92);
      --btn-fg: rgba(0,0,0,.87);
      --card-bg: rgba(255,255,255,.12);
      --card-border: rgba(255,255,255,.24);
      --text-muted: rgba(255,255,255,.70);
      --text-soft: rgba(255,255,255,.85);
      --radius: 14px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height:100vh;
      color:#fff;
      background:#000;
    }

    .bg{
      position:fixed;
      inset:0;
      background-image:url("assets/images/back_login.png");
      background-size:cover;
      background-position:center;
      z-index:-2;
    }
    .overlay{
      position:fixed;
      inset:0;
      background:var(--overlay);
      z-index:-1;
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .container{
      width:min(480px, 90vw);
      text-align:center;
    }

    .logo{
      display:block;
      margin:0 auto;
      height:108px;
      width:auto;
    }
    @media (max-height: 700px){
      .logo{ height:84px; }
    }

    .tagline{
      margin:12px 0 28px;
      font-weight:600;
      font-size:18px;
      letter-spacing:.2px;
    }

    .btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      border:none;
      border-radius:var(--radius);
      padding:14px 16px;
      background:var(--btn-bg);
      color:var(--btn-fg);
      box-shadow:0 2px 6px rgba(0,0,0,.25);
      cursor:pointer;
      font-weight:600;
      font-size:16px;
      text-decoration:none;
      user-select:none;
    }
    .btn:active{ transform: translateY(1px); }

    .spacer{ height:12px; }

    .hint{
      margin-top:8px;
      color:var(--text-muted);
      line-height:1.35;
      font-size:14px;
    }

    .card{
      margin-top:24px;
      padding:12px;
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:12px;
    }

    .card-title{
      color:var(--text-muted);
      font-weight:600;
      margin-bottom:10px;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.54);
      color:#fff;
      text-decoration:none;
      font-size:14px;
      background:transparent;
      cursor:pointer;
    }

    .icon{
      width:18px;
      height:18px;
      display:inline-block;
    }

    .muted{
      color:var(--text-soft);
      opacity:.95;
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <main class="wrap">
    <section class="container">
      <img class="logo" src="assets/images/logo_mcvapp-blanco.png" alt="MCV App" />
      <div class="tagline">No solo decimos, lo hacemos</div>

      <!-- Botones dinámicos -->
      <div id="buttons"></div>

      <div class="card">
        <div class="card-title">Enlaces rápidos</div>
        <div class="chips">
          <a class="chip" id="chip-web" href="#" rel="noopener">
            <span class="icon">🌐</span>
            <span>app.mediosconvalor.com</span>
          </a>

          <a class="chip" id="chip-play" href="#" rel="noopener">
            <span class="icon">🤖</span>
            <span>Play Store</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script>
    // URLs (equivalentes a tus static const)
    const PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.mediosconvalor.recoleccion";
    const WEBSITE_URL    = "https://app.mediosconvalor.com";

    // Helpers
    function isAndroid(){
      return /Android/i.test(navigator.userAgent);
    }
    function isIOS(){
      return /iPhone|iPad|iPod/i.test(navigator.userAgent);
    }
    function isDesktop(){
      // Heurística: no android/ios y pantalla "normal" de escritorio
      return !isAndroid() && !isIOS();
    }

    function openUrl(url){
      // Similar a LaunchMode.externalApplication (en web abre en nueva pestaña)
      window.open(url, "_blank", "noopener,noreferrer");
    }

    // Render UI según plataforma (similar a tus if (isAndroid) ... else if ...)
    const buttons = document.getElementById("buttons");

    function addButton(label, icon, onClick){
      const a = document.createElement("a");
      a.className = "btn";
      a.href = "#";
      a.innerHTML = `<span class="icon">${icon}</span><span>${label}</span>`;
      a.addEventListener("click", (e) => {
        e.preventDefault();
        onClick();
      });
      buttons.appendChild(a);

      const spacer = document.createElement("div");
      spacer.className = "spacer";
      buttons.appendChild(spacer);
    }

    function addHint(lines){
      const div = document.createElement("div");
      div.className = "hint";
      div.innerHTML = lines.map(l => `<div>${l}</div>`).join("");
      buttons.appendChild(div);
    }

    // Autoredirect si es Android (como tu initState, pero en web)
    // Nota: si esto lo pones en iFrame o con bloqueadores, podría no disparar.
    if (isAndroid()){
      // Redirección inmediata a Play Store
      // Si prefieres dar 1-2s para que alcance a ver la pantalla, usa setTimeout.
      openUrl(PLAY_STORE_URL);
    }

    // UI
    if (isAndroid()){
      addButton("Abrir en Play Store", "🤖", () => openUrl(PLAY_STORE_URL));
      addButton("Abrir app web (PWA)", "🌐", () => openUrl(WEBSITE_URL));
      // quitar último spacer extra
      buttons.lastChild?.remove();

      addHint([
        'Tip: En Android (Chrome), puedes instalar la app como PWA:',
        'Abre el sitio y toca "Añadir a pantalla principal" o el botón de instalar.'
      ]);
    } else if (isIOS()){
      addButton("Abrir app web (PWA)", "🌐", () => openUrl(WEBSITE_URL));
      buttons.lastChild?.remove();

      addHint([
        'Tip: En iPhone (Safari), agrega a pantalla de inicio:',
        'Pulsa compartir → "Añadir a pantalla de inicio" para instalar como PWA.'
      ]);
    } else if (isDesktop()){
      addButton("Abrir versión web", "🌐", () => openUrl(WEBSITE_URL));
      buttons.lastChild?.remove();

      addHint([
        'Tip: En escritorio (Chrome/Edge), puedes instalar la versión web como app:',
        'Busca el icono de instalar en la barra de direcciones para crear un acceso directo.'
      ]);
    } else {
      addButton("Abrir sitio oficial", "🌐", () => openUrl(WEBSITE_URL));
      buttons.lastChild?.remove();
    }

    // Enlaces rápidos
    const chipWeb  = document.getElementById("chip-web");
    const chipPlay = document.getElementById("chip-play");
    chipWeb.href = WEBSITE_URL;
    chipPlay.href = PLAY_STORE_URL;
  </script>
</body>
</html>
